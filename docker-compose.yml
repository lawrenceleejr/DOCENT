services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docent}
      POSTGRES_USER: ${POSTGRES_USER:-docent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docent} -d ${POSTGRES_DB:-docent}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-docent}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-docent}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      INVITE_CODE: ${INVITE_CODE:-}
      ACCESS_TOKEN_DAYS: ${ACCESS_TOKEN_DAYS:-7}
      COOKIE_SECURE: ${COOKIE_SECURE:-auto}
      # Optional: path (inside the container) to a CA bundle so the institution
      # importer trusts a corporate/TLS-inspecting proxy when calling Overpass /
      # Nominatim. Leave empty for normal internet.
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backup:
    build: ./docker/backup
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-docent}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-docent}
      BACKUP_HOUR: ${BACKUP_HOUR:-02}
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: {}
  backups: {}
