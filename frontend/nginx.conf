# Preserve the original scheme when a TLS reverse proxy (Caddy/Traefik) sits in
# front: honor its X-Forwarded-Proto if present, else use our own scheme.
map $http_x_forwarded_proto $docent_forwarded_proto {
    default $scheme;
    https   https;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $docent_forwarded_proto;
        # Admin institution imports call Overpass/Nominatim synchronously and
        # can take a while; don't cut them off at nginx's 60s default.
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SPA routes fall back to index.html.
    location / {
        try_files $uri /index.html;
    }
}
