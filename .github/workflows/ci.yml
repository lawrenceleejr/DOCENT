# CI for DOCENT — adapted from the ci-testing skill (lawrenceleejr/skills_larry).
# DOCENT doesn't use the skill's run.sh entry point, so the test job runs pytest
# against a Postgres service (matching local dev) and builds the frontend to
# catch type errors. The publish job pushes both images to GHCR on the default
# branch, tagged latest + commit SHA, authed with GITHUB_TOKEN (no extra secrets).
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: docent
          POSTGRES_PASSWORD: docent
          POSTGRES_DB: docent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docent -d docent"
          --health-interval 5s --health-timeout 3s --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: pip install -e '.[test]'

      - name: Run backend tests
        working-directory: backend
        env:
          # Stats SQL uses date_trunc + native enums — tests need real Postgres.
          TEST_DATABASE_URL: postgresql+psycopg://docent:docent@localhost:5432/docent_test
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (type-check + bundle)
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

  # Publishes images to GHCR on:
  #   • push to main            → tags: edge, <sha>
  #   • push of a vX.Y.Z tag    → tags: <version>, latest, <sha>  (a release)
  # So `:latest` always means "latest tagged release" and `:edge` tracks main.
  publish:
    needs: test
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        id: img
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/docent" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          P="${{ steps.img.outputs.prefix }}"
          SHA="${{ github.sha }}"
          for name in backend frontend backup; do
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              VER="${GITHUB_REF#refs/tags/}"
              list="$P-$name:$VER"$'\n'"$P-$name:latest"$'\n'"$P-$name:$SHA"
            else
              list="$P-$name:edge"$'\n'"$P-$name:$SHA"
            fi
            { echo "$name<<EOF"; echo "$list"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          done

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.tags.outputs.backend }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build & push backup
        uses: docker/build-push-action@v6
        with:
          context: ./docker/backup
          push: true
          tags: ${{ steps.tags.outputs.backup }}
          cache-from: type=gha,scope=backup
          cache-to: type=gha,mode=max,scope=backup
